name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
      - run: go build ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
      - run: go test -race -coverprofile=coverage.out ./...
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: coverage.out

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: false
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: latest

  security:
    name: Security (govulncheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: golang/govulncheck-action@032d45514ae346b1db93c04b0c90b841c370344f # v1.1.0

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      # Build and load (no push): validates the Dockerfile and that the build
      # context carries everything go:embed needs (e.g. docs/rules/*.md), and
      # produces a local image for Trivy to scan. The release image build runs on
      # tags in docker.yml; this catches drift in PRs.
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: false
          load: true
          tags: cfgaudit:ci
      # Scan the base image's OS packages for CVEs — the gap Dependabot's docker
      # ecosystem can only paper over with tag bumps. The Go binary's own vulns are
      # covered by govulncheck (reachability-aware), so scan OS packages only:
      # gating on all Go-stdlib CVEs would flake red whenever the pinned Go builder
      # trails the latest patch. ignore-unfixed skips CVEs with no available fix so
      # only an actionable base-image bump blocks the build.
      - name: Trivy image scan (OS packages)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: cfgaudit:ci
          format: table
          severity: CRITICAL,HIGH
          vuln-type: os
          ignore-unfixed: true
          exit-code: '1'

  hadolint:
    name: Security (hadolint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # Lints the Dockerfile itself for issues neither Trivy (CVEs in the built
      # image) nor dockle (the image's runtime config) sees: unpinned base tags,
      # shell pitfalls, wasteful layers. Piped over stdin so hadolint needs no
      # access to the build context.
      - name: Lint Dockerfile
        run: docker run --rm -i hadolint/hadolint:v2.14.0 hadolint - < Dockerfile

  dockle:
    name: Security (dockle)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Build image
        run: docker build -t cfgaudit:ci .
      # CIS hardening checks on the built image — the non-root user (CIS-DI-0001)
      # and credentials leaked into layers. --exit-level warn gates on WARN and
      # above; the remaining INFO findings (Docker content trust, HEALTHCHECK) do
      # not apply to a short-lived, non-daemon CLI container.
      - name: Lint image
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            goodwithtech/dockle:v0.4.15 --exit-code 1 --exit-level warn cfgaudit:ci

  action:
    name: Action smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # Run the composite action from this checkout against the repo itself.
      # Pin to :latest, not the action's default image tag — that default points
      # at the next release, whose image isn't built until the tag is pushed.
      - id: scan
        uses: ./
        with:
          format: sarif
          output: cfgaudit.sarif
          fail-on: never
          image: ghcr.io/cfgaudit/cfgaudit:latest
      - name: Validate the action produced valid SARIF
        shell: bash
        env:
          EXIT_CODE: ${{ steps.scan.outputs.exit-code }}
          OUTPUT_FILE: ${{ steps.scan.outputs.output-file }}
        run: |
          test -f cfgaudit.sarif
          jq -e '.version == "2.1.0" and .runs[0].tool.driver.name == "cfgaudit"' cfgaudit.sarif > /dev/null
          echo "action exit-code=$EXIT_CODE, output-file=$OUTPUT_FILE"

  zizmor:
    name: Security (zizmor)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install zizmor
        run: pip install zizmor
      - name: Run zizmor
        run: zizmor --gh-token "${{ secrets.GITHUB_TOKEN }}" .github/workflows/

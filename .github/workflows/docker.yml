name: Docker

on:
  push:
    tags:
      # Full semver tags only (vX.Y.Z) — not the moving vN GitHub Action tag.
      - 'v*.*.*'

# Default-deny at the workflow level; each job grants only what it needs, so the
# gate never holds signing rights it has no use for.
permissions: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: cfgaudit/cfgaudit

jobs:
  # A tag can point at any commit — including one whose CI failed, or one that
  # never reached main and so was never tested at all. Require a green CI run for
  # this exact SHA before anything is published. Fails closed: no completed run
  # means no push.
  gate:
    name: Require green CI
    runs-on: ubuntu-latest
    permissions:
      actions: read # read this repo's workflow-run history
    steps:
      - name: Require a successful CI run for this commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          conclusion=$(gh api \
            "repos/$REPO/actions/workflows/ci.yml/runs?head_sha=$SHA&status=completed" \
            --jq '.workflow_runs[0].conclusion // "none"')
          echo "CI conclusion for $SHA: $conclusion"
          if [ "$conclusion" != "success" ]; then
            echo "::error::Image publish blocked: CI for $SHA concluded '$conclusion', expected 'success'. If CI is still running for this commit, wait for it to finish and re-run this workflow; otherwise tag a commit whose CI passed on main."
            exit 1
          fi

  build-and-push:
    name: Build and push image
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout
      packages: write # push the image to ghcr
      id-token: write # keyless signing via Sigstore (cosign + attestations)
      attestations: write # write provenance/SBOM attestations to the GitHub attestations API
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}

      # Everything below binds to the immutable digest, never a tag: a tag can be
      # repointed after the fact, so an attestation or signature attached to one
      # would not prove anything about the artifact a user actually pulls.

      # Provenance: proves this digest was built by this workflow from this repo
      # at this commit. Verify with:
      #   gh attestation verify oci://ghcr.io/cfgaudit/cfgaudit@<digest> -R cfgaudit/cfgaudit
      - name: Attest image provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # Keyless signature (Sigstore/Fulcio, identity = this workflow). Verify with:
      #   cosign verify ghcr.io/cfgaudit/cfgaudit@<digest> \
      #     --certificate-identity-regexp '^https://github.com/cfgaudit/cfgaudit/' \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com
      - name: Sign image
        env:
          IMAGE_DIGEST: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
        run: cosign sign --yes "$IMAGE_DIGEST"

      - name: Generate image SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attest image SBOM
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: sbom.spdx.json
          push-to-registry: true

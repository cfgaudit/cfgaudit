name: Release

on:
  push:
    tags:
      # Full semver tags only (vX.Y.Z) — not the moving vN GitHub Action tag.
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub release and upload archives/checksums
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # GoReleaser needs full history + tags for the changelog
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false # release builds published artifacts; avoid cache poisoning

      - uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with contents:write on cfgaudit/homebrew-tap so the cask can be
          # pushed there (the default GITHUB_TOKEN is scoped to this repo only).
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

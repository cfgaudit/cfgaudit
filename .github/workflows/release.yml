name: Release

on:
  push:
    tags:
      # Full semver tags only (vX.Y.Z) — not the moving vN GitHub Action tag.
      - 'v*.*.*'

# Default-deny at the workflow level; each job grants only what it needs, so the
# gate never holds release or signing rights it has no use for.
permissions: {}

jobs:
  # A tag can point at any commit — including one whose CI failed, or one that
  # never reached main and so was never tested at all. Require a green CI run for
  # this exact SHA before anything is published. Fails closed: no completed run
  # means no release.
  gate:
    name: Require green CI
    runs-on: ubuntu-latest
    permissions:
      actions: read # read this repo's workflow-run history
    steps:
      - name: Require a successful CI run for this commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          conclusion=$(gh api \
            "repos/$REPO/actions/workflows/ci.yml/runs?head_sha=$SHA&status=completed" \
            --jq '.workflow_runs[0].conclusion // "none"')
          echo "CI conclusion for $SHA: $conclusion"
          if [ "$conclusion" != "success" ]; then
            echo "::error::Release blocked: CI for $SHA concluded '$conclusion', expected 'success'. If CI is still running for this commit, wait for it to finish and re-run this workflow; otherwise tag a commit whose CI passed on main."
            exit 1
          fi

  goreleaser:
    name: GoReleaser
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub release and upload archives/checksums
      id-token: write # keyless signing of the provenance via Sigstore
      attestations: write # write the attestation to the GitHub attestations API
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # GoReleaser needs full history + tags for the changelog
          persist-credentials: false

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: false # release builds published artifacts; avoid cache poisoning

      # Provides the syft binary the `sboms:` block in .goreleaser.yml shells out
      # to; without it GoReleaser fails the release rather than skipping SBOMs.
      - name: Install syft (for SBOM generation)
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with contents:write on cfgaudit/homebrew-tap so the cask can be
          # pushed there (the default GITHUB_TOKEN is scoped to this repo only).
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      # Provenance for the release archives — proves each archive was built by
      # this workflow from this repo at this commit. Runs after GoReleaser so
      # dist/ is populated. Verify a downloaded archive with:
      #   gh attestation verify cfgaudit_<ver>_<os>_<arch>.tar.gz -R cfgaudit/cfgaudit
      - name: Attest release artifacts
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          # checksums.txt is attested too, not just the archives: bin/cfgaudit
          # (the plugin wrapper) downloads it and verifies every binary against
          # it, so for anyone installing without a Go toolchain it *is* the
          # integrity anchor — and it needs one of its own.
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt

# cfgaudit's CFG007, CFG050 and CFG054 rules detect hardcoded secrets, so their
# tests and rule docs contain deliberately fake strings shaped like AWS access
# keys, GitHub PATs, GitLab PATs and Anthropic/OpenAI API keys. Excluding those
# paths keeps them from raising alerts or blocking pushes via push protection.
#
# No sample token is quoted in this file: the config itself is not excluded from
# scanning, so an example here would be the very thing it is meant to silence.
#
# NOTE: secret scanning is currently disabled on this repository, so this file
# has no effect yet. It exists so that enabling secret scanning and push
# protection does not immediately produce noise from the fixtures.
#
# Scoped to the exact files that carry sample tokens — not `rules/*_test.go`,
# which would blind the scanner to ~90 files to silence three. The failure modes
# are asymmetric: too narrow means a blocked push the next time a fixture is
# added, which is loud and self-correcting; too broad means a real credential
# committed to a test file goes unnoticed. Prefer the loud one.
#
# Adding a secret-detection rule with its own fixtures? Add the file here.
paths-ignore:
  - "rules/cfg007_test.go"
  - "rules/cfg050_test.go"
  - "rules/cfg054_test.go"
  - "docs/rules/CFG007.md"
  - "docs/rules/CFG050.md"
